<!-- 저장/불러오기 버튼 -->
<button onclick="openSaveModal()">저장 및 불러오기</button>

<div class="modal-backdrop" id="saveModal" onclick="onBackdropClick(event)">
  <div class="modal-sheet">
    <div class="modal-title">임시저장 슬롯</div>
    <div id="slotList"></div>
    <button class="modal-close" onclick="closeSaveModal()">닫기</button>
  </div>
</div>

<style>
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 50; align-items: flex-end;
}
.modal-backdrop.on { display: flex; }
.modal-sheet {
  background: white; width: 100%;
  border-radius: 18px 18px 0 0;
  padding: 16px 16px 24px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
}
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.slot-card {
  border: 1px solid #e0e0e0; border-radius: 10px;
  padding: 10px 12px; margin-bottom: 8px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.slot-info { flex: 1; }
.slot-name { font-size: 13px; font-weight: 700; }
.slot-time { font-size: 11px; color: #757575; margin-top: 2px; }
.slot-actions { display: flex; gap: 5px; }
.slot-btn {
  padding: 5px 10px; border-radius: 8px;
  font-size: 11px; font-weight: 600; cursor: pointer; border: none; white-space: nowrap;
}
.slot-btn.save { background: #e3f0ff; color: #1565c0; }
.slot-btn.load { background: #e8f5e9; color: #2e7d32; }
.slot-btn.del  { background: #ffebee; color: #c62828; }
.modal-close {
  width: 100%; padding: 11px; background: #f5f5f5; border: none;
  border-radius: 10px; font-size: 14px; font-weight: 600; color: #757575;
  cursor: pointer; margin-top: 4px;
}
</style>

<script>
const SAVE_KEY = 'erp_slot_';
const SLOT_NAMES = ['슬롯 1', '슬롯 2', '슬롯 3'];

function getState() {
  // 현재 앱 상태를 객체로 반환 (앱에 맞게 수정)
  return { /* ... */ };
}

function applyState(state) {
  // 저장된 상태를 앱에 적용 (앱에 맞게 수정)
}

function saveToSlot(slot) {
  const existing = localStorage.getItem(SAVE_KEY + slot);
  if (existing) {
    const prev = JSON.parse(existing);
    if (!confirm(`슬롯 ${slot+1}에 이미 저장된 데이터가 있습니다.\n(${prev.savedAt})\n덮어쓸까요?`)) return;
  }
  const state = getState();
  const now = new Date(), pad = n => String(n).padStart(2, '0');
  state.savedAt = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  localStorage.setItem(SAVE_KEY + slot, JSON.stringify(state));
  renderSlots();
}

function loadFromSlot(slot) {
  const raw = localStorage.getItem(SAVE_KEY + slot);
  if (!raw) return;
  if (!confirm(`슬롯 ${slot+1}을 불러오면 현재 입력값이 사라집니다. 계속할까요?`)) return;
  applyState(JSON.parse(raw));
  closeSaveModal();
}

function deleteSlot(slot) {
  if (!confirm(`슬롯 ${slot+1} 저장 데이터를 삭제할까요?`)) return;
  localStorage.removeItem(SAVE_KEY + slot);
  renderSlots();
}

function renderSlots() {
  document.getElementById('slotList').innerHTML = SLOT_NAMES.map((name, i) => {
    const data = localStorage.getItem(SAVE_KEY + i) ? JSON.parse(localStorage.getItem(SAVE_KEY + i)) : null;
    return `
      <div class="slot-card">
        <div class="slot-info">
          <div class="slot-name">${name}</div>
          <div class="slot-time" style="${data ? '' : 'color:#bbb'}">${data ? data.savedAt : '비어 있음'}</div>
        </div>
        <div class="slot-actions">
          <button class="slot-btn save" onclick="saveToSlot(${i})">저장</button>
          ${data ? `<button class="slot-btn load" onclick="loadFromSlot(${i})">불러오기</button>` : ''}
          ${data ? `<button class="slot-btn del"  onclick="deleteSlot(${i})">삭제</button>` : ''}
        </div>
      </div>`;
  }).join('');
}

function openSaveModal()  { renderSlots(); document.getElementById('saveModal').classList.add('on'); }
function closeSaveModal() { document.getElementById('saveModal').classList.remove('on'); }
function onBackdropClick(e) { if (e.target === document.getElementById('saveModal')) closeSaveModal(); }
</script>
